<svg
  width="100"
  height="100"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>/* CHANGE COLORS HERE */
    :root {
      --bg-color: #000000;    /* Background color (e.g., #4A90E2 for blue) */
      --text-color: #FFFFFF;  /* Letter color */
    }

    .bg { fill: var(--bg-color); }
    .letter { 
      fill: var(--text-color); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      font-weight: 900; 
      font-size: 75px; 
    }</style>

  <rect class="bg" width="100" height="100" rx="20" />

  <text class="letter" x="50" y="72" text-anchor="middle">N</text>
</svg>
